<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MomentumX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --bg: #020c1a;
      --cyan: #00dcff;
      --txt: #cce8ff;
      --txt2: #4a85a8;
      --panel: rgba(6, 14, 30, 0.65);
      --border: rgba(255,255,255,0.07);
    }
    body {
      background: var(--bg);
      color: var(--txt);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(ellipse at top right, rgba(0, 220, 255, 0.15) 0%, transparent 40%),
        radial-gradient(ellipse at bottom left, rgba(0, 80, 255, 0.15) 0%, transparent 40%),
        linear-gradient(rgba(0, 220, 255, 0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 220, 255, 0.022) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 55px 55px, 55px 55px;
      overflow: hidden;
    }
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      background: var(--panel);
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.02);
      position: relative;
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
    }
    .logo-ico {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--cyan), #0050ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 18px rgba(0, 220, 255, 0.4);
      animation: hpulse 3s ease-in-out infinite;
    }
    @keyframes hpulse {
      0%, 100% { box-shadow: 0 0 15px rgba(0, 220, 255, 0.4); }
      50% { box-shadow: 0 0 35px rgba(0, 220, 255, 0.85); }
    }
    .logo h1 {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: var(--cyan);
      text-shadow: 0 0 12px var(--cyan);
      text-transform: uppercase;
    }
    .form-group {
      margin-bottom: 24px;
    }
    .form-group label {
      display: block;
      font-size: 11px;
      color: var(--txt2);
      margin-bottom: 8px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(0, 12, 28, 0.9);
      border: 1px solid rgba(0, 220, 255, 0.15);
      border-radius: 12px;
      color: var(--txt);
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.3s ease;
    }
    .form-group input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0, 220, 255, 0.15);
    }
    .form-group input::placeholder {
      color: rgba(74, 133, 168, 0.5);
    }
    .btn-login {
      width: 100%;
      padding: 14px 16px;
      background: linear-gradient(135deg, #00dcff, #0050ff);
      border: none;
      border-radius: 12px;
      color: #000;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 0 0 22px rgba(0, 220, 255, 0.45), 0 4px 18px rgba(0, 80, 255, 0.35);
      transition: all 0.2s;
      text-transform: uppercase;
      margin-top: 10px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 38px rgba(0, 220, 255, 0.7), 0 8px 28px rgba(0, 80, 255, 0.5);
    }
    .btn-login:active {
      transform: translateY(0);
    }
    .footer-links {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
    }
    .footer-links a {
      color: var(--txt2);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-links a:hover {
      color: var(--cyan);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo">
      <div class="logo-ico">⚛</div>
      <h1>MomentumX</h1>
    </div>
    
    <form action="MomentumX_Physics_Simulator (10).html" method="GET">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="vendosni email-in tuaj" required>
      </div>
      <div class="form-group">
        <label for="password">Fjalëkalimi</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">Hyr në Laborator</button>
    </form>

    <div class="footer-links">
      <a href="#">Keni harruar fjalëkalimin?</a>
    </div>
  </div>

</body>
</html>
